<style>
:root{
  --bg:#0B0D0F; --bg2:#121519; --card:#171B20; --card2:#1E232A;
  --line:#262C34; --tx:#EDF0F3; --tx2:#9AA4B0; --tx3:#5F6975;
  --acc:#FF5A1F; --acc2:#FF8A4C;
  --p:#4EA8FF; --c:#F5C518; --g:#FF6B8A; --w:#39D3E0; --ok:#3ED598; --warn:#FFB020; --bad:#FF4D4D;
  --azul-bg:#15325C; --azul-tx:#8CC4FF;
  --tomB:#1C2128; --tomC:#222831;
  --r:16px; --rs:10px;
  --sans:'Inter',system-ui,sans-serif; --serif:'Fraunces',Georgia,serif;
  --safe-b:env(safe-area-inset-bottom,0px);
}
[data-theme="light"]{
  --bg:#F5F6F8; --bg2:#FFFFFF; --card:#FFFFFF; --card2:#F0F2F5;
  --line:#E2E6EB; --tx:#12161B; --tx2:#5C6672; --tx3:#98A2AE;
  --azul-bg:#DCE9FA; --azul-tx:#1B4B8F;
  --tomB:#F1F3F6; --tomC:#E9ECF1;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);font-size:15px;line-height:1.5;overscroll-behavior-y:none}
button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
button{background:none;border:none;cursor:pointer}
input,select,textarea{background:var(--card2);border:1px solid var(--line);border-radius:var(--rs);padding:11px 12px;width:100%;outline:none}
input:focus,select,textarea:focus{border-color:var(--acc)}
select{appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--tx2) 50%),linear-gradient(135deg,var(--tx2) 50%,transparent 50%);background-position:calc(100% - 16px) 50%,calc(100% - 11px) 50%;background-size:5px 5px;background-repeat:no-repeat}
h1,h2,h3{font-family:var(--serif);font-weight:600;letter-spacing:-.01em}
.app{max-width:760px;margin:0 auto;padding:0 16px calc(96px + var(--safe-b));min-height:100%}
.hdr{position:sticky;top:0;z-index:30;background:linear-gradient(var(--bg) 70%,transparent);padding:18px 0 12px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.hdr h1{font-size:24px}
.hdr .sub{color:var(--tx2);font-size:12px;text-transform:uppercase;letter-spacing:.08em}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:12px}
.card.tight{padding:12px}
.row{display:flex;align-items:center;gap:12px}
.between{justify-content:space-between}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.muted{color:var(--tx2)}.dim{color:var(--tx3)}
.tiny{font-size:12px}.sm{font-size:13px}
.big{font-family:var(--serif);font-size:32px;font-weight:600;letter-spacing:-.02em}
.lbl{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);margin-bottom:5px;display:block}
.btn{background:var(--acc);color:#fff;border-radius:var(--rs);padding:12px 16px;font-weight:600;text-align:center;display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%}
.btn:active{transform:scale(.98)}
.btn.ghost{background:var(--card2);color:var(--tx);border:1px solid var(--line)}
.btn.sm{padding:8px 12px;font-size:13px;width:auto}
.btn.danger{background:transparent;border:1px solid var(--bad);color:var(--bad)}
.chip{background:var(--card2);border:1px solid var(--line);border-radius:999px;padding:7px 13px;font-size:13px;white-space:nowrap;font-weight:500}
.chip.on{background:var(--acc);border-color:var(--acc);color:#fff}
.scroller{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.scroller::-webkit-scrollbar{display:none}
.bar{height:6px;background:var(--card2);border-radius:99px;overflow:hidden}
.bar>i{display:block;height:100%;border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.list>div{padding:11px 0;border-bottom:1px solid var(--line)}
.list>div:last-child{border-bottom:none}
.tap{cursor:pointer}.tap:active{opacity:.6}
nav{position:fixed;bottom:0;left:0;right:0;z-index:40;background:color-mix(in srgb,var(--bg2) 92%,transparent);backdrop-filter:blur(18px);border-top:1px solid var(--line);padding-bottom:var(--safe-b)}
nav .in{max-width:760px;margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr);align-items:center;height:64px}
nav button{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--tx3);font-size:10px;font-weight:600;letter-spacing:.03em}
nav button.on{color:var(--acc)}
nav svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.fab{width:48px;height:48px;border-radius:16px;background:var(--acc);color:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto;box-shadow:0 6px 20px rgba(255,90,31,.35)}
.fab svg{stroke-width:2.4;width:24px;height:24px}
.sheet{position:fixed;inset:0;z-index:60;display:none}
.sheet.on{display:block}
.sheet .bd{position:absolute;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);animation:fade .2s}
.sheet .pn{position:absolute;bottom:0;left:0;right:0;max-height:92vh;overflow-y:auto;background:var(--bg2);border-radius:22px 22px 0 0;border-top:1px solid var(--line);padding:8px 16px calc(24px + var(--safe-b));animation:up .28s cubic-bezier(.2,.8,.2,1);max-width:760px;margin:0 auto}
.grab{width:36px;height:4px;border-radius:9px;background:var(--line);margin:6px auto 14px}
@keyframes up{from{transform:translateY(100%)}}
@keyframes fade{from{opacity:0}}
.toast{position:fixed;left:50%;bottom:calc(84px + var(--safe-b));transform:translateX(-50%);background:var(--tx);color:var(--bg);padding:11px 18px;border-radius:99px;font-size:13px;font-weight:600;z-index:90;animation:fade .2s;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.alert{border-left:3px solid var(--warn);background:color-mix(in srgb,var(--warn) 8%,var(--card));padding:12px 14px;border-radius:0 var(--rs) var(--rs) 0;margin-bottom:8px;font-size:13.5px}
.alert.seg{border-color:var(--bad);background:color-mix(in srgb,var(--bad) 8%,var(--card))}
.alert.ok{border-color:var(--ok);background:color-mix(in srgb,var(--ok) 8%,var(--card))}
.ring{transform:rotate(-90deg)}
.ring circle{fill:none;stroke-linecap:round}
.hidden{display:none!important}
.seg{display:flex;background:var(--card2);border-radius:var(--rs);padding:3px;gap:2px}
.seg button{flex:1;padding:8px;border-radius:7px;font-size:13px;font-weight:600;color:var(--tx2)}
.seg button.on{background:var(--card);color:var(--tx);box-shadow:0 1px 3px rgba(0,0,0,.2)}
.msg{padding:11px 14px;border-radius:14px;margin-bottom:8px;max-width:88%;font-size:14px;white-space:pre-wrap;line-height:1.55}
.msg.u{background:var(--acc);color:#fff;margin-left:auto;border-bottom-right-radius:4px}
.msg.a{background:var(--card);border:1px solid var(--line);border-bottom-left-radius:4px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--tx3);font-size:10px;text-transform:uppercase;letter-spacing:.06em;padding:6px 4px;font-weight:600}
td{padding:5px 4px;border-top:1px solid var(--line)}
td input{padding:8px 6px;text-align:center;background:var(--card2)}
.ck{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;background:var(--card2);flex:none}
/* número da série: badge azul */
.nser{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:8px;
  background:var(--azul-bg);color:var(--azul-tx);font-weight:700;font-size:13px;font-variant-numeric:tabular-nums}
/* páginas de exercício alternam o tom do fundo, para não confundir um com o outro */
.exA{background:var(--card)} .exB{background:var(--tomB)} .exC{background:var(--tomC)}
.ck.on{background:var(--ok);border-color:var(--ok);color:#0B0D0F}
.disc{font-size:11px;color:var(--tx3);line-height:1.5;margin-top:10px}
.pill{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 7px;border-radius:6px;background:var(--card2);color:var(--tx2)}
</style>
</head>

   FITLIFE AI — app pessoal, single-file, 100% local.
   Camadas:  STORE (persistência) → CALC (motor único) → GUARD (segurança)
             → DATA (catálogos) → UI (render) → VIEWS (telas)
   Regra de ouro: nenhuma fórmula fora de CALC.
   ═══════════════════════════════════════════════════════════════════ */

/* ─────────── STORE ─────────── */
const KEY='fitlife.v1';
const BLANK={v:1,profile:null,goals:{},foods:[],overrides:{},meals:{},water:{},fasts:[],plans:[],sessions:[],activities:[],weights:[],measures:[],sleep:[],templates:[],favs:[],prefs:{tema:'dark',modelo:'adaptativo'},alertsSeen:{}};
let S=structuredClone(BLANK), _t=null;
const hasWS = typeof window!=='undefined' && window.storage && typeof window.storage.get==='function';
async function load(){
  try{
    let raw=null;
    if(hasWS){ try{ const r=await window.storage.get('fitlife'); raw=r&&r.value; }catch(e){} }
    if(!raw) raw=localStorage.getItem(KEY);
    if(raw) S=Object.assign(structuredClone(BLANK),JSON.parse(raw));
  }catch(e){ console.warn('load',e); }
}
let _cheio=false;
function save(){
  clearTimeout(_t);
  _t=setTimeout(async()=>{
    const raw=JSON.stringify(S);
    let gravou=false;
    try{ localStorage.setItem(KEY,raw); gravou=true; _cheio=false; }
    catch(e){
      if(!_cheio){ _cheio=true;
        alert('A memória do aparelho encheu e o app NÃO conseguiu salvar.\n\nProvável causa: fotos de evolução. Vá em Configurações → Backup, baixe o backup e apague algumas fotos em Corpo → Fotos.');
      }
    }
    if(hasWS){ try{ await window.storage.set('fitlife',raw); gravou=true; }catch(e){} }
  },250);
}

function openSheet(h){$('#sheetC').innerHTML=h;$('#sheet').classList.add('on');}
function closeSheet(){$('#sheet').classList.remove('on'); if(demoT){clearInterval(demoT);demoT=null;}}

function bar(v,max,color){const p=max?Math.min(v/max,1)*100:0;return `<div class="bar"><i style="width:${p}%;background:${color}"></i></div>`;}

/* ─────────── CALC — motor único de cálculo ─────────── */
const CALC={
  idade(){ const n=S.profile?.nasc; if(!n) return 30; const d=new Date(n),h=new Date(); let a=h.getFullYear()-d.getFullYear(); const m=h.getMonth()-d.getMonth(); if(m<0||(m===0&&h.getDate()<d.getDate()))a--; return a; },
  pesoAtual(){ if(S.weights.length){ const w=[...S.weights].sort((a,b)=>b.date.localeCompare(a.date)); return w[0].peso; } return S.profile?.peso||70; },
  // Tendência: média móvel exponencial (α=.1). Peso bruto NUNCA entra em projeção.
  tendencia(){ const w=[...S.weights].sort((a,b)=>a.date.localeCompare(b.date)); if(!w.length) return []; let t=w[0].peso; return w.map(x=>{ t=t+0.1*(x.peso-t); return {date:x.date,peso:x.peso,trend:r1(t)}; }); },
  tendenciaAtual(){ const t=this.tendencia(); return t.length?t[t.length-1].trend:this.pesoAtual(); },
  // TMB: Katch-McArdle se houver %gordura (mais preciso), senão Mifflin-St Jeor
  tmb(){ const p=S.profile; if(!p) return 0; const w=this.pesoAtual(), h=p.altura, a=this.idade();
    if(p.bf>0){ const mm=w*(1-p.bf/100); return Math.round(370+21.6*mm); }
    return Math.round(10*w+6.25*h-5*a+(p.sexo==='masculino'?5:-161)); },
  fatorNEAT(){ return {sedentario:1.2,leve:1.3,moderado:1.4,intenso:1.5,muito_intenso:1.6}[S.profile?.nivel||'leve']; },
  // TEF ≈ 10% do consumido
  tef(d){ return Math.round(this.nutriDia(d).kcal*0.10); },
  // EAT: MET × 3,5 × peso ÷ 200 × minutos  (+ musculação da sessão)
  kcalAtiv(a){ const w=this.pesoAtual(); const met=a.met||6; return Math.round(met*3.5*w/200*a.min); },
  eat(d){ let k=0;
    S.activities.filter(a=>a.date===d).forEach(a=>k+=a.kcal);
    S.sessions.filter(s=>s.date===d&&s.fim).forEach(s=>{ const min=(s.fim-s.inicio)/60000; k+=Math.round(5*3.5*this.pesoAtual()/200*min); });
    return Math.round(k); },
  // TDEE ADAPTATIVO: deriva o gasto real do balanço energético do próprio usuário.
  // Só é usado com ≥14 dias de peso + registro. Antes disso, modelo dinâmico (bootstrap).
  tdeeAdaptativo(){
    const t=this.tendencia(); if(t.length<10) return null;
    const dias=Object.keys(S.meals).filter(d=>this.nutriDia(d).kcal>500).sort();
    if(dias.length<10) return null;
    const win=dias.slice(-21); const t2=t.filter(x=>x.date>=win[0]);
    if(t2.length<2) return null;
    const n=(new Date(t2[t2.length-1].date)-new Date(t2[0].date))/86400000;
    if(n<7) return null;
    const dPeso=t2[t2.length-1].trend-t2[0].trend;
    const media=win.reduce((s,d)=>s+this.nutriDia(d).kcal,0)/win.length;
    const tdee=media-(dPeso*7700/n);
    if(tdee<800||tdee>6000) return null;
    return {tdee:Math.round(tdee),dias:Math.round(n),conf:Math.min(1,win.length/21)};
  },
  tdee(d){ d=d||today();
    const ad=S.prefs.modelo==='adaptativo'?this.tdeeAdaptativo():null;
    if(ad) return {v:ad.tdee+this.eat(d),base:ad.tdee,metodo:'adaptativo',conf:ad.conf,eat:this.eat(d)};
    // O fator NEAT já embute o efeito térmico dos alimentos (TEF) — somá-lo de novo
    // seria duplo cômputo e faria a meta subir conforme a pessoa come.
    const base=Math.round(this.tmb()*this.fatorNEAT());
    return {v:base+this.eat(d),base,metodo:'dinâmico',conf:.5,eat:this.eat(d)};
  },
  // METAS — com salvaguardas aplicadas
  metas(d){ d=d||today(); const p=S.profile; if(!p) return null;
    const g=S.goals, w=this.pesoAtual(), td=this.tdee(d);
    let kcal;
    if(g.kcalManual) kcal=g.kcalManual;
    else{
      const obj=p.objetivo;
      let ritmo=Math.min(Math.abs(g.ritmo||0.5),GUARD.ritmoMax());
      let delta=0;
      if(['emagrecimento','recomposicao','hipertrofia_baixo_bf'].includes(obj)) delta=-(ritmo*7700/7);
      else if(['hipertrofia','forca'].includes(obj)) delta=+(Math.min(ritmo,0.3)*7700/7);
      kcal=Math.round(td.v+delta);
    }
    const piso=GUARD.pisoKcal();
    const limitado=kcal<piso;
    if(limitado) kcal=piso;
    const deficit=['emagrecimento','recomposicao','hipertrofia_baixo_bf'].includes(p.objetivo);
    const prot=r1((deficit?2.2:1.8)*(p.bf>0?w*(1-p.bf/100)*1.1:w));
    const gord=r1(Math.max(0.8*w,(kcal*0.25)/9));
    const carb=r1(Math.max(0,(kcal-prot*4-gord*9)/4));
    const fibra=Math.round(kcal/1000*14);
    const agua=Math.round(35*w+(this.eat(d)>0?600:0));
    return {kcal,prot,carb,gord,fibra,agua,tdee:td,limitado,piso};
  },
  nutriDia(d){ const ms=S.meals[d]||[]; const t={kcal:0,p:0,c:0,g:0,f:0,n:0,itens:0};
    ms.forEach(m=>{ if(m.itens.length) t.n++; m.itens.forEach(i=>{ t.kcal+=i.kcal;t.p+=i.p;t.c+=i.c;t.g+=i.g;t.f+=i.f||0;t.itens++; }); });
    ['kcal','p','c','g','f'].forEach(k=>t[k]=Math.round(t[k]*10)/10); return t; },
  aguaDia(d){ return (S.water[d]||[]).reduce((s,x)=>s+x.ml,0); },
  // Volume: músculo secundário conta 0,5 série
  volumeSemana(ini){ const fim=addDays(ini,6); const v={};
    S.sessions.filter(s=>s.date>=ini&&s.date<=fim).forEach(s=>{
      s.sets.filter(x=>x.feito&&x.tipo!=='aquecimento').forEach(x=>{
        const e=exGet(x.exId); if(!e) return;
        v[e[1]]=(v[e[1]]||0)+1; (e[2]||[]).forEach(m=>v[m]=(v[m]||0)+0.5);
      });});
    return v; },
  e1rm(carga,reps){ if(!carga||!reps) return 0; return r1(carga*(1+reps/30)); }, // Epley
  projecao(){ const t=this.tendencia(); const meta=S.goals.pesoMeta; if(!meta||t.length<10) return null;
    const w=t.slice(-28); if(w.length<10) return null;
    const dias=(new Date(w[w.length-1].date)-new Date(w[0].date))/86400000; if(dias<7) return null;
    const taxa=(w[w.length-1].trend-w[0].trend)/dias; const atual=w[w.length-1].trend;
    const falta=meta-atual;
    if(Math.abs(taxa)<0.002||(falta>0)!==(taxa>0)) return {estagnado:true,atual,meta};
    const d=Math.round(falta/taxa);
    if(d<0||d>1500) return {estagnado:true,atual,meta};
    const dt=new Date(); dt.setDate(dt.getDate()+d);
    const lo=new Date(); lo.setDate(lo.getDate()+Math.round(d*0.85));
    const hi=new Date(); hi.setDate(hi.getDate()+Math.round(d*1.2));
    return {atual,meta,dias:d,semanal:r1(taxa*7),lo,hi};
  }
};
const exGet=id=>{ const c=S.foods; const i=EXS.findIndex(e=>e[0]===id); if(i>=0) return EXS[i];
  const cu=(S.exsCustom||[]).find(e=>e[0]===id); return cu||null; };

/* ─────────── ALERTAS — regras determinísticas (offline, grátis, sem alucinação) ─────────── */
function alertas(){
  const d=today(), a=[], m=CALC.metas(d); if(!m) return a;
  const n=CALC.nutriDia(d), ag=CALC.aguaDia(d), h=new Date().getHours();
  if(m.limitado) a.push({t:'seg',x:`Sua meta calórica foi ajustada para o piso de segurança (${m.piso} kcal). O app não recomenda comer abaixo da sua taxa metabólica basal.`});
  if(h>=19&&n.p<m.prot*0.75&&n.kcal>500) a.push({t:'w',x:`Proteína em ${Math.round(n.p)} g de ${m.prot} g. Faltam ${Math.round(m.prot-n.p)} g — dá tempo de ajustar no jantar.`});
  if(h>=18&&ag<m.agua*0.6) a.push({t:'w',x:`Água em ${(ag/1000).toFixed(1)} L de ${(m.agua/1000).toFixed(1)} L.`});
  if(h>=20&&n.f<m.fibra*0.6&&n.kcal>800) a.push({t:'w',x:`Fibras baixas hoje (${Math.round(n.f)} g de ${m.fibra} g).`});
  // Sequência de treinos sem descanso
  let seq=0; for(let i=0;i<10;i++){ const dd=addDays(d,-i); if(S.sessions.some(s=>s.date===dd&&s.fim)) seq++; else break; }
  if(seq>=7) a.push({t:'w',x:`${seq} dias consecutivos de treino. Um dia de descanso melhora a recuperação e o resultado.`});
  // Volume por grupamento
  const ini=addDays(d,-6), v=CALC.volumeSemana(ini);
  if(S.sessions.some(s=>s.date>=ini)){
    Object.entries(VOL).forEach(([k,[mev,mrv]])=>{ const s=v[k]||0;
      if(s>mrv) a.push({t:'w',x:`${MG[k]}: ${s} séries nesta semana — acima da faixa recomendada (${mev}–${mrv}). Risco de fadiga acumulada.`});
    });
  }
  // Peso estagnado
  const t=CALC.tendencia();
  if(t.length>=21&&S.profile.objetivo==='emagrecimento'){
    const rec=t.slice(-21); const dl=rec[rec.length-1].trend-rec[0].trend;
    if(Math.abs(dl)<0.3) a.push({t:'w',x:`Tendência de peso estável há ~3 semanas. Provavelmente seu gasto real mudou — o modelo adaptativo já está reajustando.`});
    if(dl<-2.5) a.push({t:'seg',x:`Você perdeu ${Math.abs(r1(dl))} kg em 3 semanas — ritmo acelerado. Perdas rápidas custam massa magra. Considere subir as calorias.`});
  }
  return a.filter(x=>!S.alertsSeen[d+x.x.slice(0,20)]);
}

/* ── LEMBRETES DE ÁGUA (som + vibração + notificação) ── */
function wcfg(){ S.prefs.agua=S.prefs.agua||{on:false,min:90,ini:8,fim:22,last:0}; return S.prefs.agua; }
/* ── ÁUDIO ──
   O Safari do iOS bloqueia som que não venha de um toque. A solução é criar UM
   AudioContext e destravá-lo no primeiro toque da usuária no app; depois disso,
   sons disparados por temporizador (descanso, água) passam a tocar. */
let AC=null, audioOK=false;
function unlockAudio(){
  try{
    if(!AC){ const C=window.AudioContext||window.webkitAudioContext; if(!C) return; AC=new C(); }
    if(AC.state==='suspended') AC.resume();
    const b=AC.createBuffer(1,1,22050), s=AC.createBufferSource();
    s.buffer=b; s.connect(AC.destination); s.start(0);
    audioOK=(AC.state==='running');
  }catch(e){ audioOK=false; }
}
['touchstart','touchend','click','keydown'].forEach(ev=>
  document.addEventListener(ev,()=>{ unlockAudio(); },{passive:true}));

function beep(){
  try{
    if(!AC) unlockAudio();
    if(!AC){ vibra(); return false; }
    if(AC.state!=='running') AC.resume();
    if(AC.state!=='running'){ audioOK=false; vibra(); return false; }   // ainda bloqueado
    [0,0.18,0.36].forEach((t,i)=>{
      const o=AC.createOscillator(), g=AC.createGain();
      o.connect(g); g.connect(AC.destination);
      o.frequency.value=[880,1100,1320][i]; o.type='sine';
      g.gain.setValueAtTime(0,AC.currentTime+t);
      g.gain.linearRampToValueAtTime(0.35,AC.currentTime+t+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+t+0.16);
      o.start(AC.currentTime+t); o.stop(AC.currentTime+t+0.18);
    });
    audioOK=true;
  }catch(e){ audioOK=false; }
  vibra();
  return audioOK;
}
function vibra(){ try{ if(navigator.vibrate) navigator.vibrate([180,90,180]); }catch(e){} }  // iPhone não tem
async function toggleWater(on){
  const c=wcfg();
  if(on){
    unlockAudio();                                   // o toque no botão libera o som no iOS
    if(typeof Notification!=='undefined' && Notification.permission==='default'){
      try{ await Notification.requestPermission(); }catch(e){}
    }
  }
  c.on=on; c.last=Date.now(); save(); render();
  if(on){ const soou=beep(); toast(soou?'Lembretes ligados':'Lembretes ligados (som bloqueado — toque em Testar som)'); }
}
function tickWater(){
  const c=wcfg(); if(!c.on||!S.profile) return;
  const now=new Date(), h=now.getHours();
  if(h<c.ini||h>=c.fim) return;                       // respeita a janela de sono
  const d=today(), m=CALC.metas(); if(!m) return;
  if(CALC.aguaDia(d)>=m.agua) return;                 // meta batida: para de avisar
  const logs=S.water[d]||[];
  const ult=logs.length?logs[logs.length-1].t:0;
  const ref=Math.max(ult,c.last||0);
  if(Date.now()-ref < c.min*60000) return;
  c.last=Date.now(); save();
  beep();
  const falta=Math.round((m.agua-CALC.aguaDia(d))/100)*100;
  if(typeof Notification!=='undefined' && Notification.permission==='granted'){
    try{ new Notification('💧 Hora de beber água',{body:`Faltam ${(falta/1000).toFixed(1)} L para a sua meta de hoje.`,tag:'agua'}); }catch(e){}
  }
  if(VIEW==='water'||VIEW==='home') toast('💧 Hora de beber água');
}

function setIni(h){
  const d=new Date(Date.now()-h*3600000);
  $('#jf_ini').value=new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,16);
  jfCalc();
}
function jfHoras(){ const b=document.querySelector('#jf_p .on'); const h=+b.dataset.h;
  return h>0?h:Math.min(24,Math.max(1,+$('#jf_hh').value||16)); }
function jfCalc(){
  const ini=new Date($('#jf_ini').value).getTime(); const h=jfHoras();
  if(isNaN(ini)) return;
  const fim=ini+h*3600000, dec=Date.now()-ini;
  $('#jf_fim').textContent=new Date(fim).toLocaleString('pt-BR',{weekday:'short',hour:'2-digit',minute:'2-digit'});
  $('#jf_dec').textContent=dec>0?`${Math.floor(dec/3600000)} h ${Math.floor(dec%3600000/60000)} min`:'—';
}
function startFast(){
  const ini=new Date($('#jf_ini').value).getTime();
  if(isNaN(ini)) return toast('Informe o horário de início');
  if(ini>Date.now()) return toast('O início não pode ser no futuro');
  const h=jfHoras(); const b=document.querySelector('#jf_p .on');
  const proto=+b.dataset.h>0?b.dataset.n:`${h}h`;
  S.fasts=S.fasts.filter(f=>f.status!=='ativo');
  S.fasts.push({id:uid(),proto,horas:h,inicio:ini,fim_prev:ini+h*3600000,status:'ativo'});
  save(); closeSheet(); go('fast'); toast('Jejum iniciado');
}
function sheetEditFast(){
  const f=S.fasts.find(x=>x.status==='ativo'); if(!f) return;
  const iso=t=>{const d=new Date(t);return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,16);};
  openSheet(`<h3>Ajustar jejum</h3>
    <label class="lbl" style="margin-top:12px">Comecei em</label>
    <input id="je_ini" type="datetime-local" value="${iso(f.inicio)}" max="${iso(Date.now())}">

}
function saveEditFast(){
  const f=S.fasts.find(x=>x.status==='ativo'); if(!f) return;
  const ini=new Date($('#je_ini').value).getTime();
  const h=Math.min(24,Math.max(1,+$('#je_h').value||16));
  if(isNaN(ini)) return toast('Horário inválido');
  if(ini>Date.now()) return toast('O início não pode ser no futuro');
  f.inicio=ini; f.horas=h; f.fim_prev=ini+h*3600000;
  save(); closeSheet(); render(); toast('Jejum ajustado');
}
function sheetStopFast(st){
  const f=S.fasts.find(x=>x.status==='ativo'); if(!f) return;
  const iso=t=>{const d=new Date(t);return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,16);};
  openSheet(`<h3>${st==='concluido'?'Encerrar jejum':'Interromper jejum'}</h3>
    <p class="muted sm" style="margin:6px 0 12px">Quebrou o jejum e só agora registrou? Ajuste o horário.</p>
    <label class="lbl">Encerrei em</label>
    <input id="js_fim" type="datetime-local" value="${iso(Date.now())}" max="${iso(Date.now())}">
    <button class="btn" style="margin-top:16px" onclick="stopFast('${st}')">Confirmar</button>`);
}
function stopFast(st){
  const f=S.fasts.find(x=>x.status==='ativo'); if(!f) return;
  const v=$('#js_fim'); let fim=v?new Date(v.value).getTime():Date.now();
  if(isNaN(fim)||fim>Date.now()) fim=Date.now();
  if(fim<f.inicio) return toast('O fim não pode ser antes do início');
  f.fim=fim; f.status=st;
  save(); closeSheet(); render();
  toast(st==='concluido'?`Jejum de ${r1((fim-f.inicio)/3600000)} h concluído`:'Jejum interrompido');
}
function tickFast(){
  const f=S.fasts.find(x=>x.status==='ativo'); if(!f) return;
  const el2=$('#fastClock');
  const ms=Date.now()-f.inicio, tot=f.fim_prev-f.inicio;
  const h=Math.floor(ms/3600000), m=Math.floor(ms%3600000/60000), s=Math.floor(ms%60000/1000);
  const txt=`${h}:${String(m).padStart(2,'0')}`;
  if(el2) el2.textContent=txt;
  const big=$('#fastBig');
  if(big){ big.textContent=`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    $('#fastRing').innerHTML=ring(Math.min(ms/tot,1),170,13,ms>=tot?'var(--ok)':'var(--acc)');
    const fase=h<4?'Digestão':h<12?'Glicogênio em queda':h<16?'Início da queima de gordura':h<18?'Queima de gordura':'Queima de gordura / autofagia inicial';
    $('#fastSub').textContent=ms>=tot?'janela liberada':'decorrido';
    $('#fastFase').textContent='Fase: '+fase;
  }
}

    ${S.sessions.filter(s=>s.fim).sort((a,b)=>b.inicio-a.inicio).slice(0,12).map(s=>{
      const ts=s.sets.filter(x=>x.feito).reduce((a,x)=>a+(x.carga||0)*(x.reps||0),0);
      return `<div class="row between tap" onclick="go('session',{id:'${s.id}',ro:1})">
        <div><div class="sm">${esc(s.nome)}</div><div class="tiny dim">${dstr(s.date)} · ${Math.round((s.fim-s.inicio)/60000)} min · ${s.sets.filter(x=>x.feito).length} séries</div></div>

function addEx(di,nome){

function savePlan(){

/* Normaliza o volume semanal: nenhum grupamento pode passar do MRV.
   Reduz séries do exercício mais carregado; se não der, remove um isolado. */
function volDe(dds){ const v={};
  dds.forEach(d=>d.ex.forEach(e=>{ const ex=EXS.find(x=>x[0]===e.exId); if(!ex) return;
    v[ex[1]]=(v[ex[1]]||0)+e.series; (ex[2]||[]).forEach(m=>v[m]=(v[m]||0)+e.series*0.5); }));
  return v; }
function ajustarVolume(dds){
  const pular=new Set();
  for(let it=0;it<300;it++){
    const v=volDe(dds);
    const over=Object.entries(v)
      .filter(([g,s])=>VOL[g]&&s>VOL[g][1]&&!pular.has(g))
      .sort((a,b)=>(b[1]-VOL[b[0]][1])-(a[1]-VOL[a[0]][1]));
    if(!over.length) break;
    const g=over[0][0];
    let alvo=null;
    dds.forEach(d=>d.ex.forEach(e=>{ const ex=EXS.find(x=>x[0]===e.exId);
      if(ex&&ex[1]===g&&e.series>2&&(!alvo||e.series>alvo.series)) alvo=e; }));
    if(alvo){ alvo.series--; continue; }
    let rm=null,rd=null;
    dds.forEach(d=>d.ex.forEach(e=>{ const ex=EXS.find(x=>x[0]===e.exId);
      if(ex&&ex[1]===g&&d.ex.length>3&&!e.iaFoco&&(!rm||!ex[4])){ rm=e; rd=d; } }));  // isolado antes de composto; nunca o do foco
    if(rm){ rd.ex=rd.ex.filter(e=>e!==rm); continue; }
    pular.add(g);   // excesso vem só de músculo secundário — aceitável
  }
  return dds;
}

function gerarPlano(){
  const dias=+document.querySelector('#au_d .on').dataset.d;
  const local=document.querySelector('#au_l .on').dataset.l;
  const focos=[...document.querySelectorAll('#au_f .on')].map(b=>b.dataset.f);
  const F=FOCOS.filter(f=>focos.includes(f.id));
  const prio=new Set(F.flatMap(f=>f.g));                 // grupamentos prioritários
  const evitar=new Set(F.flatMap(f=>f.evitar||[]));      // contraindicados pelo foco
  const eq=local==='casa'?['livre','halter']:null;
  const cfg=setsPorObjetivo();
  if(dias>=5) cfg.series=Math.max(3,cfg.series-1);   // grupamento repete mais vezes na semana
  const split=structuredClone(SPLITS[dias]);
  const usados=new Set();
  const ok=e=>!evitar.has(e[0])&&(!eq||eq.includes(e[3]));

  const mk=nome=>({exId:nome,...cfg,series:cfg.series+(EXS.find(e=>e[0]===nome)&&prio.has(EXS.find(e=>e[0]===nome)[1])?1:0)});

  const dds=split.map(([nome,grupos],i)=>{
    // grupamentos prioritários entram primeiro na ordem do dia
    const gs=[...grupos].sort((a,b)=>(prio.has(b)?1:0)-(prio.has(a)?1:0));
    const ex=[];
    gs.forEach(g=>{
      let cand=EXS.filter(e=>e[1]===g&&ok(e));
      if(!cand.length) cand=EXS.filter(e=>e[1]===g&&!evitar.has(e[0]));
      cand.sort((a,b)=>b[4]-a[4]);                        // compostos primeiro
      const grande=['peitoral','dorsais','quadriceps','gluteo','posterior'].includes(g);
      let n=grande?2:1;
      if(prio.has(g)) n+=1;                               // +1 exercício no que é prioridade
      let add=0;
      for(const c of cand){ if(usados.has(c[0])) continue; ex.push(mk(c[0])); usados.add(c[0]); if(++add>=n) break; }
    });
    return {letra:'ABCDEF'[i],nome,gs:grupos,ex};
  });

  // Exercícios-chave de cada foco: entram no dia que trabalha aquele grupamento
  F.forEach(f=>f.ex.forEach(nome=>{
    if(usados.has(nome)||evitar.has(nome)) return;
    const e=EXS.find(x=>x[0]===nome); if(!e) return;
    if(eq&&!eq.includes(e[3])) return;
    let d=dds.find(x=>x.gs.includes(e[1])||x.gs.some(g=>(e[2]||[]).includes(g)));
    if(!d) d=dds.find(x=>x.gs.some(g=>f.g.includes(g)));        // cai no dia do próprio foco
    if(!d) d=dds.slice().sort((a,b)=>a.ex.length-b.ex.length)[0];
    // dia cheio: abre espaço tirando o último isolado que NÃO é do foco
    if(d.ex.length>=9){   // dia cheio: abre espaço tirando primeiro um isolado que não é do foco
      let i=[...d.ex].reverse().findIndex(x=>{const e2=EXS.find(y=>y[0]===x.exId);return e2&&!e2[4]&&!x.iaFoco;});
      if(i<0) i=[...d.ex].reverse().findIndex(x=>!x.iaFoco);
      if(i>=0) d.ex.splice(d.ex.length-1-i,1);
    }
    if(d.ex.length>=9) return;
    d.ex.push({...mk(nome),iaFoco:true}); usados.add(nome);
  }));

  // focos de força e de condicionamento ajustam séries/reps de toda a ficha
  if(focos.includes('forca')) dds.forEach(d=>d.ex.forEach(e=>{e.repsMin=4;e.repsMax=6;e.descanso=180;}));
  else if(focos.includes('condicionamento')) dds.forEach(d=>d.ex.forEach(e=>{e.repsMin=12;e.repsMax=15;e.descanso=45;}));
  if(focos.includes('iniciante')) dds.forEach(d=>{d.ex=d.ex.slice(0,6);d.ex.forEach(e=>{e.series=Math.min(e.series,3);});});

  ajustarVolume(dds);
  const conj=!!(document.querySelector('#au_conj')&&document.querySelector('#au_conj').classList.contains('on'));
  const nomes={2:'AB',3:'ABC',4:'ABCD',5:'ABCDE',6:'Push Pull Legs'};
  const obj=({emagrecimento:'Emagrecimento',hipertrofia:'Hipertrofia',recomposicao:'Recomposição',manutencao:'Manutenção',condicionamento:'Condicionamento',forca:'Força',saude:'Saúde'})[S.profile.objetivo];
  let dias2=dds.map(d=>({letra:d.letra,nome:d.nome,ex:d.ex.slice(0,9)}));
  if(conj) dias2=dias2.map(d=>({...d,ex:conjugar(d.ex),conj:true}));
  window._plan={id:uid(),nome:`${nomes[dias]} — ${obj}${conj?' · conjugado':''}`,dias:dias2,focos,conj,novo:1};
  S.goals.focos=focos; S.goals.conjugado=conj; save();
  closeSheet(); render(); toast(conj?'Ficha conjugada montada':(focos.length?'Ficha montada com seus focos':'Ficha montada — confira e salve'));
}
/* ── MODO CONJUGADO ──
   Pareia exercícios em super-séries para aumentar a densidade do treino
   (mais trabalho no mesmo tempo, frequência cardíaca alta = mais gasto),
   SEM alterar séries nem volume — a carga e o volume continuam iguais,
   muda só a organização e o descanso.
   Regra de pareamento, na ordem: antagonista natural → empurrar×puxar →
   dois que sobraram. Compostos pesados (agachamento, terra) ficam sozinhos:
   parear movimento pesado prejudica a técnica. */
const ANTAG={peitoral:'dorsais',dorsais:'peitoral',biceps:'triceps',triceps:'biceps',
  quadriceps:'posterior',posterior:'quadriceps',lombar:'abdomen',abdomen:'lombar',
  ombros:'dorsais'};
const PESADOS=new Set(['Agachamento livre','Agachamento frontal','Levantamento terra',
  'Levantamento terra romeno','Stiff','Leg press','Desenvolvimento militar']);
function grpDe(nome){ const e=EXS.find(x=>x[0]===nome); return e?e[1]:null; }
function empurra(nome){ const g=grpDe(nome); return ['peitoral','ombros','triceps','quadriceps','gluteo','panturrilha'].includes(g); }

function conjugar(ex){
  const rest=ex.slice();
  const solos=[], pares=[];
  // 1) tira os pesados para ficarem sozinhos
  for(let i=rest.length-1;i>=0;i--){ if(PESADOS.has(rest[i].exId)){ solos.push(rest[i]); rest.splice(i,1); } }
  // 2) pareia antagonistas
  const usado=new Array(rest.length).fill(false);
  for(let i=0;i<rest.length;i++){
    if(usado[i]) continue;
    const gi=grpDe(rest[i].exId); let par=-1;
    for(let j=i+1;j<rest.length;j++){
      if(usado[j]) continue;
      if(grpDe(rest[j].exId)===ANTAG[gi]){ par=j; break; }
    }
    // 3) se não achou antagonista, pareia empurrar com puxar
    if(par<0) for(let j=i+1;j<rest.length;j++){
      if(usado[j]) continue;
      if(empurra(rest[j].exId)!==empurra(rest[i].exId)){ par=j; break; }
    }
    // 4) último caso: qualquer par que sobrou
    if(par<0) for(let j=i+1;j<rest.length;j++){ if(!usado[j]){ par=j; break; } }
    if(par>=0){ usado[i]=usado[par]=true; pares.push([rest[i],rest[par]]); }
    else { usado[i]=true; solos.push(rest[i]); }
  }
  // remonta: super-séries primeiro, isolados pesados no fim
  const out=[]; let g=1;
  pares.forEach(([a,b])=>{
    const desc=Math.max(45,Math.min(a.descanso,b.descanso)-30); // descanso menor: só no fim do par
    out.push({...a,ss:g,ssPos:0,descanso:15});   // ~15s de transição entre A e B
    out.push({...b,ss:g,ssPos:1,descanso:desc});  // descanso real depois do par
    g++;
  });
  solos.forEach(s=>out.push({...s}));
  return out;
}

function startSession(planId,di){

  const s={id:uid(),date:today(),nome:day?`${day.letra} — ${day.nome}`:'Treino livre',inicio:Date.now(),fim:null,sets};

}

const EXDB_URL='https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/dist/exercises.json';
const EXDB_IMG='https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/';
let EXDB=null, exdbCarregando=false;

function normEx(t){ return (t||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
  .replace(/[^a-z0-9 ]/g,' ').split(/\s+/).filter(w=>w.length>2&&!['the','and','with','for'].includes(w)); }

async function loadExDB(){
  if(EXDB||exdbCarregando) return EXDB;
  try{ const c=localStorage.getItem('fitlife.exdb'); if(c){ EXDB=JSON.parse(c); return EXDB; } }catch(e){}
  exdbCarregando=true;
  try{
    const r=await fetch(EXDB_URL); if(!r.ok) throw new Error('http');
    const j=await r.json();
    EXDB=j.filter(x=>x.images&&x.images.length).map(x=>[x.name,x.images[0],x.images[1]||x.images[0]]);
    try{ localStorage.setItem('fitlife.exdb',JSON.stringify(EXDB)); }catch(e){}
  }catch(e){ EXDB=null; }
  exdbCarregando=false;
  return EXDB;
}
// casa por semelhança de palavras — resiste a diferenças de nome
function matchEx(nome){
  if(!EXDB) return null;
  const alvo=normEx(EN[nome]||nome); if(!alvo.length) return null;
  let melhor=null, best=0;
  for(const e of EXDB){
    const t=normEx(e[0]);
    const inter=alvo.filter(w=>t.includes(w)).length;
    const sc=inter/Math.max(alvo.length,t.length*0.6);
    if(sc>best){ best=sc; melhor=e; }
  }
  return best>=0.5?melhor:null;
}

  <div class="card ${['exA','exB','exC'][sIdx%3]}" style="padding:20px 16px">

function setF(id,f,v){ S.sessions.forEach(s=>s.sets.forEach(x=>{ if(x.id===id) x[f]=v===''?'':+v; })); save(); }
function addSet(sid,exId){
  const s=S.sessions.find(x=>x.id===sid); if(!s) return;
  const doEx=s.sets.filter(x=>x.exId===exId);
  const ult=doEx[doEx.length-1];
  const ref=doEx.filter(x=>x.feito&&x.carga).pop()||ult;   // herda a carga da última série FEITA
  s.sets.push({id:uid(),exId,
    ordEx:ult?ult.ordEx:s.sets.length,
    ordSerie:doEx.length,
    tipo:'valida',
    carga:ref?ref.carga:'',
    reps:'',
    repsAlvo:ult?ult.repsAlvo:'',
    rpe:'',
    descanso:ult?ult.descanso:90,
    feito:false});
  save(); render();
}
function doneSet(id,rest){
  let done=false, sess=null, exId=null;
  S.sessions.forEach(s=>s.sets.forEach(x=>{ if(x.id===id){ x.feito=!x.feito; done=x.feito; sess=s; exId=x.exId; } }));
  save();
  if(done){ startRest(rest); checkPR(id); }
  render();
  // terminou todas as séries do exercício? passa para o próximo sozinho
  if(done&&sess&&!sess.fim){
    const doEx=sess.sets.filter(x=>x.exId===exId);
    if(doEx.every(x=>x.feito)){
      const exs=[...new Set(sess.sets.map(x=>x.exId))];
      const i=exs.indexOf(exId);
      if(i<exs.length-1) setTimeout(()=>{ sIdx=i+1; render(); toast('Próximo exercício'); },900);
    }
  }
}
function checkPR(id){
  let set=null,ex=null;
  S.sessions.forEach(s=>s.sets.forEach(x=>{ if(x.id===id){set=x;ex=x.exId;} }));
  if(!set||!set.carga||!set.reps) return;
  const e1=CALC.e1rm(set.carga,set.reps);
  let best=0;
  S.sessions.forEach(s=>s.sets.forEach(x=>{ if(x.exId===ex&&x.feito&&x.id!==id&&x.carga&&x.reps) best=Math.max(best,CALC.e1rm(x.carga,x.reps)); }));
  if(e1>best&&best>0) setTimeout(()=>toast(`🏆 Recorde em ${ex}! 1RM estimado ${e1} kg`),300);
}
function startRest(s){ restLeft=s||90; $('#restBox')?.classList.remove('hidden'); }
function stopRest(){ restLeft=0; $('#restBox')?.classList.add('hidden'); }
function tickSession(){
  const b=$('#restC');
  if(restLeft>0&&b){ restLeft--; b.textContent=`${Math.floor(restLeft/60)}:${String(restLeft%60).padStart(2,'0')}`;
    if(restLeft===0){ b.textContent='Vai!'; beep(); setTimeout(stopRest,1800); } }
  const s=S.sessions.find(x=>!x.fim), t=$('#sessT');
  if(s&&t){ const m=Math.floor((Date.now()-s.inicio)/60000); t.textContent=`${m} min`; }
}
function endSession(id){
  const s=S.sessions.find(x=>x.id===id);
  s.fim=Date.now(); s.sets=s.sets.filter(x=>x.feito);
  if(!s.sets.length){ S.sessions=S.sessions.filter(x=>x.id!==id); save(); return go('train'); }
  save(); go('train'); toast('Treino concluído');
}

function chartLine(raw,trend,meta){
  const all=[...raw,...trend,...(meta?[meta]:[])];
  const mn=Math.min(...all)-.6, mx=Math.max(...all)+.6, W=320,H=110;
  const px=(i,n)=>i/(n-1)*W, py=v=>H-(v-mn)/(mx-mn)*H;
  const path=a=>a.map((v,i)=>`${i?'L':'M'}${px(i,a.length).toFixed(1)},${py(v).toFixed(1)}`).join(' ');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:120px;margin-top:14px;overflow:visible">
    ${meta?`<line x1="0" y1="${py(meta)}" x2="${W}" y2="${py(meta)}" stroke="var(--acc)" stroke-dasharray="3 4" stroke-width="1" opacity=".6"/>`:''}
    ${raw.map((v,i)=>`<circle cx="${px(i,raw.length)}" cy="${py(v)}" r="2" fill="var(--tx3)"/>`).join('')}
    <path d="${path(trend)}" stroke="var(--acc)" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </svg><div class="tiny dim" style="text-align:center">pontos = peso do dia · linha = tendência${meta?' · tracejado = meta':''}</div>`;
}

function addPhoto(inp){
  const f=inp.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{ const img=new Image(); img.onload=()=>{
    const c=document.createElement('canvas'); const mx=720; const sc=Math.min(1,mx/Math.max(img.width,img.height));
    c.width=img.width*sc; c.height=img.height*sc;
    c.getContext('2d').drawImage(img,0,0,c.width,c.height);
    S.photos=S.photos||[];
    S.photos.push({id:uid(),date:today(),src:c.toDataURL('image/jpeg',0.6),peso:CALC.pesoAtual()});
    save(); render(); toast('Foto salva no aparelho');
  }; img.src=rd.result; };
  rd.readAsDataURL(f);
}

/* ── RELATÓRIOS ── */
function vReports(){
  const d=today();
  const dias=[...Array(30)].map((_,i)=>addDays(d,-29+i));
  const kcal=dias.map(x=>CALC.nutriDia(x).kcal);
  const m=CALC.metas();
  const comReg=dias.filter(x=>CALC.nutriDia(x).kcal>300);
  const media=comReg.length?Math.round(comReg.reduce((s,x)=>s+CALC.nutriDia(x).kcal,0)/comReg.length):0;
  const prot=comReg.length?Math.round(comReg.reduce((s,x)=>s+CALC.nutriDia(x).p,0)/comReg.length):0;
  const treinos=S.sessions.filter(s=>s.fim&&s.date>=dias[0]).length;
  const ativ=S.activities.filter(a=>a.date>=dias[0]);
  const ad=CALC.tdeeAdaptativo();
  const mx=Math.max(m.kcal,...kcal);
  return `<div class="hdr"><div><div class="sub">Últimos 30 dias</div><h1>Relatório</h1></div><button class="chip" onclick="go('more')">✕</button></div>
  ${ad?`<div class="card" style="border-color:var(--acc)">
    <span class="lbl">Seu gasto real (TDEE adaptativo)</span>
    <div class="big">${ad.tdee} <span class="tiny muted">kcal/dia</span></div>
    <p class="sm muted" style="margin-top:6px">Calculado a partir do seu próprio balanço energético em ${ad.dias} dias — não de fórmula. É o número mais confiável que existe para você.</p>
    <div class="tiny dim" style="margin-top:6px">Confiança: ${Math.round(ad.conf*100)}% · fórmula estimava ${Math.round(CALC.tmb()*CALC.fatorNEAT())} kcal</div>
  </div>`:`<div class="card"><span class="lbl">TDEE adaptativo</span>
    <p class="sm muted" style="margin-top:6px">Registre peso e alimentação por ~2 semanas e o app passa a calcular seu gasto <b>real</b>, em vez de usar fórmula. Faltam ${Math.max(0,14-comReg.length)} dias de registro.</p></div>`}
  <div class="card">
    <span class="lbl">Calorias — 30 dias</span>
    <div class="row" style="align-items:flex-end;height:80px;gap:2px;margin-top:10px">
      ${kcal.map(k=>`<div style="flex:1;height:${Math.max(2,k/mx*70)}px;background:${k>m.kcal?'var(--warn)':k>300?'var(--acc)':'var(--card2)'};border-radius:2px"></div>`).join('')}
    </div>
    <div class="tiny dim" style="margin-top:6px;text-align:center">linha da meta: ${m.kcal} kcal</div>
  </div>
  <div class="grid2">
    <div class="card"><div class="lbl">Média diária</div><b class="big" style="font-size:24px">${media}</b><div class="tiny dim">kcal em ${comReg.length} dias</div></div>
    <div class="card"><div class="lbl">Proteína média</div><b class="big" style="font-size:24px">${prot}</b><div class="tiny dim">g/dia · meta ${m.prot}</div></div>
    <div class="card"><div class="lbl">Treinos</div><b class="big" style="font-size:24px">${treinos}</b><div class="tiny dim">no período</div></div>
    <div class="card"><div class="lbl">Atividades</div><b class="big" style="font-size:24px">${ativ.length}</b><div class="tiny dim">${Math.round(ativ.reduce((s,a)=>s+a.kcal,0))} kcal</div></div>
  </div>
  <div class="card"><span class="lbl">Aderência ao registro</span>
    <div class="row between" style="margin:8px 0 6px"><span class="sm">Dias com alimentação registrada</span><b>${comReg.length}/30</b></div>
    ${bar(comReg.length,30,'var(--ok)')}
    <p class="tiny dim" style="margin-top:10px">Consistência de registro importa mais que perfeição na dieta. O app fica mais preciso quanto mais você registra.</p>
  </div>
  <button class="btn ghost" onclick="exportCSV()">Exportar CSV</button>`;
}
function exportCSV(){
  let csv='data;kcal;proteina_g;carbo_g;gordura_g;fibra_g;agua_ml;peso_kg;tendencia_kg;treino;kcal_atividades\n';
  const ds=[...new Set([...Object.keys(S.meals),...S.weights.map(w=>w.date),...Object.keys(S.water)])].sort();
  const t=CALC.tendencia();
  ds.forEach(d=>{ const n=CALC.nutriDia(d), w=S.weights.find(x=>x.date===d), tr=t.find(x=>x.date===d);
    const tt=S.sessions.some(s=>s.date===d&&s.fim)?1:0;
    const ka=S.activities.filter(a=>a.date===d).reduce((s,a)=>s+a.kcal,0);
    csv+=`${d};${n.kcal};${n.p};${n.c};${n.g};${n.f};${CALC.aguaDia(d)};${w?w.peso:''};${tr?tr.trend:''};${tt};${ka}\n`; });
  dl('fitlife-'+today()+'.csv',csv,'text/csv');
}
function dl(name,content,type){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type}));
  a.download=name; a.click(); toast('Arquivo gerado');
}

  const m=CALC.metas(), ad=CALC.tdeeAdaptativo();
  return `<div class="hdr"><div><div class="sub">Ajustes</div><h1>Configurações</h1></div><button class="chip" onclick="go('more')">✕</button></div>
  <div class="card"><span class="lbl">Metas</span>
    <div class="grid2" style="margin-top:8px">
      <div><label class="lbl">Peso meta (kg)</label><input id="s_meta" type="number" step="0.1" value="${S.goals.pesoMeta||''}"></div>
      <div><label class="lbl">Ritmo (kg/semana)</label><input id="s_ritmo" type="number" step="0.05" value="${S.goals.ritmo||0.5}"></div>
    </div>
    <label class="lbl" style="margin-top:12px">Calorias manuais (deixe vazio para calcular automaticamente)</label>

    <p class="disc">Limite de segurança: ${GUARD.pisoKcal()} kcal (sua TMB) e ${GUARD.ritmoMax()} kg/semana (1% do peso). O app não vai abaixo disso.</p>
  </div>
  <div class="card"><span class="lbl">Modelo de gasto energético</span>
    <div class="seg" style="margin-top:8px">
      ${[['adaptativo','Adaptativo'],['dinamico','Fórmula']].map(([k,n])=>`<button class="${S.prefs.modelo===k?'on':''}" onclick="S.prefs.modelo='${k}';save();render()">${n}</button>`).join('')}
    </div>
    <p class="disc">${ad?`Ativo: seu gasto real é <b>${ad.tdee} kcal</b>, medido pelo seu próprio balanço energético.`:'O adaptativo entra em ação depois de ~2 semanas de registro. Até lá, o app usa fórmula.'}</p>
  </div>
  <div class="card"><span class="lbl">Perfil</span>
    <div class="grid2" style="margin-top:8px">
      <div><label class="lbl">Altura (cm)</label><input id="s_alt" type="number" value="${S.profile.altura}"></div>
      <div><label class="lbl">Objetivo</label><select id="s_obj">${[['emagrecimento','Emagrecimento'],['hipertrofia','Hipertrofia'],['recomposicao','Recomposição'],['manutencao','Manutenção'],['condicionamento','Condicionamento'],['forca','Força'],['saude','Saúde']].map(([v,n])=>`<option value="${v}" ${S.profile.objetivo===v?'selected':''}>${n}</option>`).join('')}</select></div>
    </div>
    <label class="lbl" style="margin-top:12px">Nível de atividade diária</label>
    <select id="s_niv">${[['sedentario','Sedentário'],['leve','Leve'],['moderado','Moderado'],['intenso','Intenso']].map(([v,n])=>`<option value="${v}" ${S.profile.nivel===v?'selected':''}>${n}</option>`).join('')}</select>
    <button class="btn ghost" style="margin-top:12px" onclick="saveProfile()">Salvar perfil</button>
  </div>
  <div class="card"><span class="lbl">Aparência</span>
    <div class="seg" style="margin-top:8px">
      ${[['dark','Escuro'],['light','Claro']].map(([k,n])=>`<button class="${S.prefs.tema===k?'on':''}" onclick="S.prefs.tema='${k}';save();render()">${n}</button>`).join('')}
    </div>
  </div>
  <div class="card"><span class="lbl">Backup</span>
    <p class="sm muted" style="margin:6px 0 10px">Seus dados vivem só neste aparelho. Faça backup de vez em quando.</p>
    <button class="btn ghost" onclick="backup()">Baixar backup (.json)</button>
    <button class="btn ghost" style="margin-top:8px" onclick="$('#imp').click()">Restaurar backup</button>
    <input type="file" id="imp" accept=".json" class="hidden" onchange="restore(this)">
    <button class="btn danger" style="margin-top:16px" onclick="if(confirm('Apagar TODOS os dados? Isso não tem volta.')){localStorage.removeItem(KEY);location.reload()}">Apagar tudo</button>
  </div>
  <p class="disc" style="text-align:center">FitLife · uso pessoal · sem servidor, sem conta, sem IA, sem custo</p>`;
}
function saveGoals(){
  const m=+$('#s_meta').value||0;
  if(m){ const av=GUARD.checaMeta(m); if(av){ alert(av); } else S.goals.pesoMeta=m; }
  const r=+$('#s_ritmo').value||0.5;
  S.goals.ritmo=Math.min(r,GUARD.ritmoMax());
  if(r>GUARD.ritmoMax()) toast(`Ritmo limitado a ${GUARD.ritmoMax()} kg/semana por segurança`);
  const k=+$('#s_kcal').value||0;
  if(k&&k<GUARD.pisoKcal()){ toast(`Mínimo de segurança: ${GUARD.pisoKcal()} kcal`); S.goals.kcalManual=GUARD.pisoKcal(); }
  else S.goals.kcalManual=k||null;
  save(); render(); toast('Metas salvas');
}
function saveProfile(){
  S.profile.altura=+$('#s_alt').value; S.profile.objetivo=$('#s_obj').value; S.profile.nivel=$('#s_niv').value;
  save(); render(); toast('Perfil salvo');
}
function backup(){ dl('fitlife-backup-'+today()+'.json',JSON.stringify(S),'application/json'); }
function restore(inp){
  const f=inp.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{ S=Object.assign(structuredClone(BLANK),JSON.parse(r.result)); save(); render(); toast('Backup restaurado'); }
    catch(e){ toast('Arquivo inválido'); } };
  r.readAsText(f);
}

/* ─────────── FAB / WIRE / BOOT ─────────── */
function wire(){
  document.querySelectorAll('nav [data-go]').forEach(b=>{ b.onclick=()=>go(b.dataset.go); b.classList.toggle('on',b.dataset.go===VIEW); });
  $('#fab').onclick=()=>openSheet(`<h3 style="margin-bottom:14px">Registrar</h3>
    <div class="grid2">
      ${[['🍽 Alimento',`sheetAdd('${today()}')`],
        ['💧 Água 250 ml','addWater(250);closeSheet()'],['⚖️ Peso','sheetWeight()'],
        ['🏋️ Treino',"closeSheet();go('train')"],['🏃 Atividade','sheetActivity()'],
        ['⏱ Jejum',"closeSheet();go('fast')"],['📏 Medidas','sheetMeasure()']]
        .map(([n,f])=>`<button class="card tight tap" style="text-align:left" onclick="${f}"><b class="sm">${n}</b></button>`).join('')}
    </div>`);
}
/* ── PWA: instala, funciona offline, avisa quando há versão nova ── */
if(navigator.serviceWorker && typeof navigator.serviceWorker.register==='function'){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('service-worker.js').then(reg=>{
      reg.addEventListener('updatefound',()=>{
        const novo=reg.installing;
        novo && novo.addEventListener('statechange',()=>{
          if(novo.state==='installed' && navigator.serviceWorker.controller){
            const b=el('<div class="toast" style="cursor:pointer">Nova versão disponível — tocar para atualizar</div>');
            b.onclick=()=>{ novo.postMessage('atualizar'); location.reload(); };
            document.body.appendChild(b);
            setTimeout(()=>b.remove(),12000);
          }
        });
      });
    }).catch(()=>{});
  });
}
window.addEventListener('offline',()=>toast('Sem internet — o app continua funcionando'));
document.addEventListener('visibilitychange',()=>{ if(!document.hidden&&AC&&AC.state==='suspended') AC.resume(); });
setInterval(()=>{ tickFast(); tickSession(); },1000);
setInterval(tickWater,30000);
(async()=>{ await load(); render(); })();
</script>
